<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mielle Salon Supply</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>歡迎來到 Mielle Salon Supply</h1>
    <p>Hair Product Wholesaler</p>

    <div class="ai-box">
        <div class="palette">

    <h2>🎨 Color Palette</h2>

    <button onclick="selectColor('8/11')">8/11 霧感灰</button>
    <button onclick="selectColor('6/33')">6/33 奶茶棕</button>
    <button onclick="selectColor('7/3')">7/3 金棕</button>
    <button onclick="selectColor('C5/77')">C5/77 覆蓋白髮紅棕</button>
    <button onclick="selectColor('0/88')">0/88 強灰藍</button>

</div>

        <h2>AI 染髮配方生成器</h2>

        <p>輸入想要的髮色，我幫你生成專業配方</p>

        <input id="colorInput" placeholder="例如：奶茶棕 / 霧感灰 / 冷亞麻">

        <select id="hairCondition">
            <option value="normal">健康髮</option>
            <option value="damaged">受損髮</option>
            <option value="bleached">漂過髮</option>
        </select>

        <button onclick="generateFormula()">生成配方</button>

        <div id="result"></div>

    </div>

    <div class="card">
        <img src="images/jewelry.png" width="300">
        <h2>Jewelry Repair Series</h2>
        <p>專業修護受損髮質</p>
    </div>

</div>

<script>
const colorDB = [
  { code: "22/0", tone: "natural" },
  { code: "33/0", tone: "natural" },
  { code: "44/0", tone: "natural" },
  { code: "6/11", tone: "ash" },
  { code: "8/11", tone: "ash" },
  { code: "5/33", tone: "gold" },
  { code: "6/4", tone: "copper" },
  { code: "4/45", tone: "red copper" },
  { code: "0/88", tone: "intense blue ash" }
];

function generateFormula() {

    let color = document.getElementById("colorInput").value;
    let condition = document.getElementById("hairCondition").value;

    // 🔍 用 DB（未來可以升級）
    let match = colorDB.find(c => color.includes(c.code));

    let formula = "";
    let tone = "";

    if (condition === "bleached") {
        formula = "染膏 + 護色劑 + 低雙氧 3%";
        tone = "已漂髮建議使用低刺激配方";
    } 
    else if (condition === "damaged") {
        formula = "染膏 + 修護添加劑 + 6%雙氧";
        tone = "受損髮建議加入修護成分";
    } 
    else {
        formula = "標準染膏 + 6%雙氧";
        tone = "健康髮可正常上色";
    }

    document.getElementById("result").innerHTML =
        "🎨 目標：" + color + "<br>" +
        (match ? "🧾 對應色號：" + match.code + "<br>" : "") +
        "🧪 配方：" + formula + "<br>" +
        "💡 建議：" + tone;
}
</script>

</body>
</html>
